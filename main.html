<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>24. Autocomplete</title>
  <style>
    body { font-family: Arial; padding: 50px; }
    .autocomplete { position: relative; max-width: 400px; margin: auto; }
    input { width: 100%; padding: 15px; font-size: 18px; }
    .suggestions { position: absolute; width: 100%; background: white; border: 1px solid #ddd; max-height: 300px; overflow-y: auto; display: none; }
    .suggestion { padding: 12px; cursor: pointer; }
    .suggestion:hover { background: #f0f0f0; }
  </style>
</head>
<body>
  <div class="autocomplete">
    <input type="text" id="search" placeholder="Shahar nomini yozing..." autocomplete="off">
    <div class="suggestions" id="suggestions"></div>
  </div>

  <script>
    const cities = ["Tashkent", "Samarqand", "Buxoro", "Andijon", "Namangan", "Farg‘ona", "Nukus", "Urganch", "Qarshi", "Jizzax", "Navoiy", "Termiz"];

    const input = document.getElementById('search');
    const suggestionsDiv = document.getElementById('suggestions');

    input.addEventListener('input', () => {
      const term = input.value.toLowerCase();
      suggestionsDiv.innerHTML = '';
      
      if (!term) {
        suggestionsDiv.style.display = 'none';
        return;
      }

      const filtered = cities.filter(city => city.toLowerCase().includes(term));
      
      if (filtered.length === 0) {
        suggestionsDiv.style.display = 'none';
        return;
      }

      filtered.forEach(city => {
        const div = document.createElement('div');
        div.className = 'suggestion';
        div.textContent = city;
        div.onclick = () => {
          input.value = city;
          suggestionsDiv.style.display = 'none';
        };
        suggestionsDiv.appendChild(div);
      });

      suggestionsDiv.style.display = 'block';
    });
  </script>
</body>
</html>
